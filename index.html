html<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Havas Shoutouts</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #001c32;
      font-family: 'Arial', sans-serif;
      color: white;
      min-height: 100vh;
      padding: 40px;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    header h1 {
      font-size: 48px;
      font-weight: 900;
      color: #e60000;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    header p {
      font-size: 16px;
      color: rgba(255,255,255,0.5);
      margin-top: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: linear-gradient(135deg, #004080, #001c32);
      border-radius: 16px;
      padding: 28px;
      position: relative;
      animation: fadeIn 0.5s ease;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -1.5px;
      border-radius: 16px;
      background: linear-gradient(135deg, #e60000, #ffffff, #e60000);
      z-index: -1;
    }

    .card .message {
      font-size: 16px;
      line-height: 1.6;
      color: rgba(255,255,255,0.9);
      margin-bottom: 20px;
    }

    .card .recipient {
      font-size: 18px;
      font-weight: 700;
      color: #e60000;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card .recipient-dept {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .card .from {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }

    .card .from span {
      color: white;
      font-weight: 600;
    }

    .loading {
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 18px;
      margin-top: 100px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <h1>Havas Shoutouts</h1>
    <p>Recognizing the people who make us great</p>
  </header>

  <div class="grid" id="grid">
    <div class="loading">Loading shoutouts...</div>
  </div>

  <script>
    const TOKEN = 'YOUR_NEW_TOKEN_HERE';
    const BASE_ID = 'apprduW0ct2f5OLEa';
    const TABLE_NAME = 'Table 1';

    async function fetchShoutouts() {
      try {
        const res = await fetch(
          `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE_NAME)}?sort[0][field]=Created&sort[0][direction]=desc`,
          { headers: { Authorization: `Bearer ${TOKEN}` } }
        );
        const data = await res.json();
        const grid = document.getElementById('grid');
        grid.innerHTML = '';

        if (!data.records || data.records.length === 0) {
          grid.innerHTML = '<div class="loading">No shoutouts yet — be the first!</div>';
          return;
        }

        data.records.forEach(record => {
          const f = record.fields;
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div class="message">"${f['Your message'] || ''}"</div>
            <div class="recipient">${f['Who is this...'] || ''}</div>
            <div class="recipient-dept">${f['Their department'] || ''}</div>
            <div class="from">From <span>${f['Your name'] || 'Anonymous'}</span> · ${f['Your department'] || ''}</div>
          `;
          grid.appendChild(card);
        });
      } catch (err) {
        console.error(err);
      }
    }

    fetchShoutouts();
    setInterval(fetchShoutouts, 30000);
  </script>

</body>
</html>

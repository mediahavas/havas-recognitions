html<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Havas Wall of Fame</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 30px 0 20px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 14px;
      letter-spacing: 6px;
      color: #e60000;
      text-transform: uppercase;
      font-weight: 900;
      margin-bottom: 6px;
    }

    header p {
      font-size: 10px;
      letter-spacing: 3px;
      color: #333;
      text-transform: uppercase;
    }

    .stage {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .card {
      position: absolute;
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 28px 32px;
      width: 300px;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .card.visible {
      opacity: 1;
    }

    .eyebrow {
      font-size: 9px;
      letter-spacing: 3px;
      color: #e60000;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .name {
      font-size: 36px;
      font-weight: 900;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 1px;
      line-height: 1.0;
      margin-bottom: 16px;
    }

    .message {
      font-size: 14px;
      color: #aaa;
      line-height: 1.6;
      margin-bottom: 20px;
      font-style: italic;
    }

    .sender {
      font-size: 11px;
      color: #444;
      letter-spacing: 1px;
    }

    .no-data {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #333;
      font-size: 16px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header>
    <h1>Havas Wall of Fame</h1>
    <p>Recognizing the people who make us great</p>
  </header>

  <div class="stage" id="stage">
    <div class="no-data" id="noData" style="display:none">No shoutouts yet — be the first!</div>
  </div>

  <script>
    const TOKEN = 'patNkkOOneKrjQRUH.856e49d0295c02ddb7118618ec136ba248cf6b50068e0130bda4131f38c11347';
    const BASE_ID = 'apprduW0ct2f5OLEa';
    const TABLE_NAME = 'Table 1';

    let records = [];
    let activeCards = [];
    let recordIndex = 0;

    async function fetchRecords() {
      try {
        const res = await fetch(
          `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE_NAME)}`,
          { headers: { Authorization: `Bearer ${TOKEN}` } }
        );
        const data = await res.json();
        if (data.records && data.records.length > 0) {
          records = data.records;
          document.getElementById('noData').style.display = 'none';
        } else {
          document.getElementById('noData').style.display = 'block';
        }
      } catch (err) {
        console.error(err);
      }
    }

    function getRandomPosition(cardWidth, cardHeight) {
      const stage = document.getElementById('stage');
      const maxX = stage.offsetWidth - cardWidth - 20;
      const maxY = stage.offsetHeight - cardHeight - 20;
      return {
        x: Math.floor(Math.random() * maxX) + 10,
        y: Math.floor(Math.random() * maxY) + 10
      };
    }

    function spawnCard() {
      if (records.length === 0) return;

      const stage = document.getElementById('stage');
      const record = records[recordIndex % records.length];
      recordIndex++;

      const f = record.fields;
      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <div class="eyebrow">${f['Their department'] || ''}</div>
        <div class="name">${f['Who is this testimonial for?'] || ''}</div>
        <div class="message">"${f['Your message'] || ''}"</div>
        <div class="sender">— ${f['Your name'] || 'Anonymous'}</div>
      `;

      const pos = getRandomPosition(300, 220);
      card.style.left = pos.x + 'px';
      card.style.top = pos.y + 'px';

      stage.appendChild(card);

      setTimeout(() => card.classList.add('visible'), 50);

      setTimeout(() => {
        card.classList.remove('visible');
        setTimeout(() => card.remove(), 1000);
      }, 5000);
    }

    async function init() {
      await fetchRecords();
      if (records.length > 0) spawnCard();

      setInterval(spawnCard, 3000);
      setInterval(fetchRecords, 30000);
    }

    init();
  </script>

</body>
</html>

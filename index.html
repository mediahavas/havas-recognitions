<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Havas Wall of Thanks</title>
  <style>
    @font-face { font-family: 'BaikalExpSemi'; src: url('BaikalExp-SemiBold.otf') format('opentype'); }
    @font-face { font-family: 'BaikalNormalReg'; src: url('BaikalNormal-Regular.otf') format('opentype'); }
    @font-face { font-family: 'BaikalNormalSemi'; src: url('BaikalNormal-SemiBold.otf') format('opentype'); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-image: url('Background.png');
      background-size: cover;
      background-position: top center;
      font-family: 'BaikalNormalReg', Arial, sans-serif;
      width: 100vw; height: 100vh;
      overflow: hidden;
      position: relative;
    }
    header {
      text-align: center;
      padding: 32px 0 0;
      position: relative;
      z-index: 10;
    }
    .hmn-logo { height: 24px; margin-bottom: 16px; display: block; margin-left: auto; margin-right: auto; }
    header h1 {
      font-family: 'BaikalExpSemi', Arial, sans-serif;
      font-size: 68px; color: #ffffff;
      text-transform: uppercase; letter-spacing: 2px;
      line-height: 1; margin-bottom: 12px;
    }
    header p {
      font-family: 'BaikalNormalReg', Arial, sans-serif;
      font-size: 24px; color: #ffffff; font-weight: 300;
    }
    .stage { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .card-wrapper {
      position: absolute;
      border-radius: 22px; padding: 3px;
      background: rgba(255,255,255,0.5);
      width: fit-content; min-width: 326px; max-width: 480px;
      opacity: 0; transform: scale(0.9);
      will-change: transform, opacity;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
    }
    .card {
      background: #ffffff; border-radius: 20px;
      padding: 32px 36px; width: fit-content;
      min-width: 320px; max-width: 474px;
    }
    .card-top { display: flex; align-items: center; gap: 16px; margin-bottom: 18px; }
    .emoji-circle {
      width: 56px; height: 56px; background: #b3ecf7;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 28px; flex-shrink: 0;
    }
    .name-block { display: flex; flex-direction: column; align-items: flex-start; gap: 5px; }
    .eyebrow { font-family: 'BaikalNormalSemi', Arial, sans-serif; font-size: 12px; letter-spacing: 1px; color: #e60000; text-transform: uppercase; line-height: 1; }
    .name { font-family: 'BaikalExpSemi', Arial, sans-serif; font-size: 26px; color: #000; text-transform: uppercase; letter-spacing: 0.5px; line-height: 1.1; }
    .message { font-family: 'BaikalNormalReg', Arial, sans-serif; font-size: 17px; color: #222; line-height: 1.3; margin-bottom: 18px; }
    .sender { font-family: 'BaikalNormalReg', Arial, sans-serif; font-size: 14px; color: #000; }
    .qr-container { position: fixed; bottom: 32px; left: 32px; z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .qr-box { width: 170px; height: 170px; background: #000; border-radius: 16px; border: 4px solid rgba(230,0,0,0.7); display: flex; align-items: center; justify-content: center; padding: 16px; }
    .qr-box img { width: 100%; height: 100%; display: block; }
    .qr-label { font-family: 'BaikalExpSemi', Arial, sans-serif; font-size: 14px; color: #fff; text-align: center; letter-spacing: 1px; text-transform: uppercase; line-height: 1.4; }
  </style>
</head>
<body>
  <header>
    <img class="hmn-logo" src="hmn.svg" alt="Havas Media Network"/>
    <h1>Wall of Thanks</h1>
    <p>Recognizing the people who make us great</p>
  </header>
  <div class="stage" id="stage"></div>
  <div class="qr-container">
    <div class="qr-box"><img src="qrcode.svg" alt="QR Code" style="filter:invert(1);"/></div>
    <div class="qr-label">SCAN TO SEND<br>A SHOUTOUT</div>
  </div>

  <script>
    const TOKEN = 'patNkkOOneKrjQRUH.0324a72a7539b951e4dea2eaf4e3fa0218c512f0ec5c978c49830bc92a63651c';
    const BASE_ID = 'apprduW0ct2f5OLEa';
    const TABLE_NAME = 'Table 1';

    const PAD = 40;
    const GAP = 40;
    const QR_W = 240, QR_H = 290;
    const HEADER_H = 240;
    const SPAWN_INTERVAL = 500;
    let MAX_CARDS = 1;

    let activeCards = [];
    let records = [], queue = [], recentlyShown = [];
    let spawning = false;

    function getCardDuration(msg) {
      const l = msg.length;
      if (l <= 80) return 3000;
      if (l <= 160) return 5000;
      return 7000;
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function buildQueue() {
      let s = shuffle([...records]);
      if (recentlyShown.length > 0 && s.length > 1) {
        const last = recentlyShown[recentlyShown.length - 1];
        if (s[0].fields['Recipient'] === last) s.push(s.shift());
      }
      queue = s;
    }

    async function fetchRecords() {
      try {
        const res = await fetch(
          `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE_NAME)}`,
          { headers: { Authorization: `Bearer ${TOKEN}` } }
        );
        const data = await res.json();
        if (data.records && data.records.length > 0) {
          if (data.records.length !== records.length) {
            records = data.records;
            buildQueue();
          }
          MAX_CARDS = records.length <= 3 ? 1 : records.length <= 6 ? 2 : 3;
        }
      } catch(e) { console.error(e); }
    }

    function getNextRecord() {
      if (!records.length) return null;
      if (!queue.length) buildQueue();
      const activeNames = activeCards.map(c => c.name);
      let attempts = 0;
      while (attempts < queue.length) {
        const candidate = queue[0];
        const name = candidate.fields['Recipient'] || '';
        if (!activeNames.includes(name)) {
          queue.shift();
          recentlyShown.push(name);
          if (recentlyShown.length > records.length) recentlyShown.shift();
          return candidate;
        }
        queue.push(queue.shift());
        attempts++;
      }
      return queue.shift();
    }

    function overlaps(ax, ay, aw, ah, bx, by, bw, bh) {
      return !(ax + aw + GAP < bx || bx + bw + GAP < ax ||
               ay + ah + GAP < by || by + bh + GAP < ay);
    }

    function inQR(x, y, w, h) {
      const stageH = window.innerHeight;
      const qrX = 0, qrY = stageH - QR_H;
      return !(x + w < qrX || x > qrX + QR_W || y + h < qrY || y > qrY + QR_H);
    }

    function findPosition(w, h) {
      const SW = window.innerWidth, SH = window.innerHeight;
      const maxX = SW - w - PAD;
      const minY = HEADER_H + PAD;
      const maxY = SH - h - PAD;

      for (let i = 0; i < 300; i++) {
        const x = Math.floor(Math.random() * (maxX - PAD)) + PAD;
        const y = Math.floor(Math.random() * (maxY - minY)) + minY;
        if (inQR(x, y, w, h)) continue;
        const bad = activeCards.some(c => overlaps(x, y, w, h, c.rect.x, c.rect.y, c.rect.w, c.rect.h));
        if (!bad) return { x, y, w, h };
      }
      return null;
    }

    function animateCard(el, duration) {
      const start = performance.now();
      function frame(now) {
        const t = now - start;
        if (t > duration) { el.style.opacity = 0; return; }
        const p = t / duration;
        const scale = 0.9 + 0.16 * p;
        let opacity = 1;
        if (t < 600) opacity = t / 600;
        else if (t > duration - 500) opacity = 1 - (t - (duration - 500)) / 500;
        el.style.transform = `scale(${scale})`;
        el.style.opacity = Math.max(0, Math.min(1, opacity));
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    function spawnCard() {
      if (spawning || activeCards.length >= MAX_CARDS || !records.length) return;
      const record = getNextRecord();
      if (!record) return;

      spawning = true;
      const f = record.fields;
      const message = f['Message'] || '';
      const duration = getCardDuration(message);

      const stage = document.getElementById('stage');
      const wrapper = document.createElement('div');
      wrapper.className = 'card-wrapper';
      wrapper.innerHTML = `
        <div class="card">
          <div class="card-top">
            <div class="emoji-circle">${f['Emoji'] || '⭐'}</div>
            <div class="name-block">
              <div class="eyebrow">${f['Department'] || ''}</div>
              <div class="name">${f['Recipient'] || ''}</div>
            </div>
          </div>
          <div class="message">"${message}"</div>
          <div class="sender">— ${f['Name'] || ''}</div>
        </div>`;

      wrapper.style.cssText = 'left:-9999px;top:-9999px;opacity:0;';
      stage.appendChild(wrapper);

      requestAnimationFrame(() => {
        const w = wrapper.offsetWidth;
        const h = wrapper.offsetHeight;
        const pos = findPosition(w, h);

        if (!pos) {
          wrapper.remove();
          spawning = false;
          return;
        }

        wrapper.style.left = pos.x + 'px';
        wrapper.style.top = pos.y + 'px';
        wrapper.style.transformOrigin = 'center center';

        const entry = { el: wrapper, rect: { x: pos.x, y: pos.y, w, h }, name: f['Recipient'] || '' };
        activeCards.push(entry);
        spawning = false;

        animateCard(wrapper, duration);

        setTimeout(() => spawnCard(), duration - 1500);

        setTimeout(() => {
          wrapper.remove();
          activeCards = activeCards.filter(c => c !== entry);
        }, duration);
      });
    }

    async function init() {
      await fetchRecords();
      buildQueue();
      setTimeout(() => spawnCard(), 0);
      setTimeout(() => spawnCard(), 1200);
      setTimeout(() => spawnCard(), 2400);
      setInterval(() => { if (activeCards.length < MAX_CARDS) spawnCard(); }, SPAWN_INTERVAL);
      setInterval(fetchRecords, 3000);
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Havas Wall of Fame</title>
  <style>
    @font-face {
      font-family: 'BaikalExp';
      src: url('BaikalExp-Bold.otf') format('opentype');
      font-weight: 700;
    }
    @font-face {
      font-family: 'BaikalNormal';
      src: url('BaikalNormal-Regular.otf') format('opentype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'BaikalSemiBold';
      src: url('BaikalNormal-SemiBold.otf') format('opentype');
      font-weight: 600;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-image: url('Background.png');
      background-size: cover;
      background-position: top center;
      font-family: 'BaikalNormal', Arial, sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    header {
      text-align: center;
      padding: 32px 0 0;
      position: relative;
      z-index: 10;
    }
    .havas-logo {
      height: 28px;
      margin-bottom: 8px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    header h1 {
      font-family: 'BaikalExp', Arial, sans-serif;
      font-size: 68px;
      font-weight: 700;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1;
      margin-bottom: 12px;
    }
    header p {
      font-family: 'BaikalNormal', Arial, sans-serif;
      font-weight: 400;
      font-size: 22px;
      letter-spacing: 0px;
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
    }
    .stage {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .card-wrapper {
      position: absolute;
      border-radius: 22px;
      padding: 3px;
      background: rgba(255, 255, 255, 0.5);
      width: fit-content;
      min-width: 326px;
      max-width: 480px;
      opacity: 0;
      transform: scale(0.9);
    }
    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 32px 36px;
      width: fit-content;
      min-width: 320px;
      max-width: 474px;
    }
    .card-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }
    .emoji-circle {
      width: 56px;
      height: 56px;
      background: #b3ecf7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }
    .name-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 5px;
    }
    .eyebrow {
      font-family: 'BaikalSemiBold', Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 1px;
      color: #e60000;
      text-transform: uppercase;
      line-height: 1;
    }
    .name {
      font-family: 'BaikalExp', Arial, sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: #000;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      line-height: 1.1;
    }
    .message {
      font-family: 'BaikalNormal', Arial, sans-serif;
      font-weight: 400;
      font-size: 17px;
      color: #222;
      line-height: 1.3;
      margin-bottom: 18px;
    }
    .sender {
      font-family: 'BaikalNormal', Arial, sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: #000;
    }
  </style>
</head>
<body>

  <header>
    <img class="havas-logo" src="Havas%20Logo.svg" alt="Havas"/>
    <h1>Wall of Fame</h1>
    <p>Recognizing the people who make us great</p>
  </header>

  <div class="stage" id="stage"></div>

  <script>
    const TOKEN = 'patNkkOOneKrjQRUH.43a25539d6ff627a80b2e67e848a02636fca169aba8f352e74d0de88b310106d';
    const BASE_ID = 'apprduW0ct2f5OLEa';
    const TABLE_NAME = 'Table 1';

    const MARGIN = 24;
    const MAX_CARDS = 4;
    const HEADER_H = 230;
    const CARD_DURATION = 5000;
    const SPAWN_INTERVAL = 2000;

    let activeCards = [];
    let records = [];
    let recordIndex = 0;

    async function fetchRecords() {
      try {
        const res = await fetch(
          `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE_NAME)}`,
          { headers: { Authorization: `Bearer ${TOKEN}` } }
        );
        const data = await res.json();
        if (data.records && data.records.length > 0) {
          records = data.records;
        }
      } catch (err) {
        console.error(err);
      }
    }

    function rectsOverlap(a, b) {
      return !(a.x + a.w + MARGIN < b.x ||
               b.x + b.w + MARGIN < a.x ||
               a.y + a.h + MARGIN < b.y ||
               b.y + b.h + MARGIN < a.y);
    }

    function findPosition(w, h) {
      const stageW = window.innerWidth;
      const stageH = window.innerHeight;
      for (let attempt = 0; attempt < 150; attempt++) {
        const x = Math.floor(Math.random() * (stageW - w - MARGIN * 2)) + MARGIN;
        const y = Math.floor(Math.random() * (stageH - h - HEADER_H - MARGIN)) + HEADER_H;
        const candidate = { x, y, w, h };
        if (!activeCards.some(c => rectsOverlap(candidate, c.rect))) return candidate;
      }
      return null;
    }

    function animateCard(el, duration) {
      const start = performance.now();
      const startScale = 0.9;
      const endScale = 1.06;
      const fadeInDuration = 800;
      const fadeOutStart = duration - 600;

      function frame(now) {
        const elapsed = now - start;
        if (elapsed > duration) {
          el.style.opacity = 0;
          el.style.transform = `scale(${endScale})`;
          return;
        }
        const progress = elapsed / duration;
        const scale = startScale + (endScale - startScale) * progress;
        let opacity = 1;
        if (elapsed < fadeInDuration) {
          opacity = elapsed / fadeInDuration;
        } else if (elapsed > fadeOutStart) {
          opacity = 1 - (elapsed - fadeOutStart) / 600;
        }
        el.style.transform = `scale(${scale})`;
        el.style.opacity = Math.max(0, Math.min(1, opacity));
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    function spawnCard() {
      if (activeCards.length >= MAX_CARDS || records.length === 0) return;

      const record = records[recordIndex % records.length];
      recordIndex++;
      const f = record.fields;

      const stage = document.getElementById('stage');
      const wrapper = document.createElement('div');
      wrapper.className = 'card-wrapper';
      wrapper.innerHTML = `
        <div class="card">
          <div class="card-top">
            <div class="emoji-circle">${f['Emoji'] || '⭐'}</div>
            <div class="name-block">
              <div class="eyebrow">${f['Department'] || ''}</div>
              <div class="name">${f['Recipient'] || ''}</div>
            </div>
          </div>
          <div class="message">"${f['Message'] || ''}"</div>
          <div class="sender">— ${f['Name'] || ''}</div>
        </div>
      `;

      wrapper.style.left = '-9999px';
      wrapper.style.top = '-9999px';
      wrapper.style.opacity = '0';
      stage.appendChild(wrapper);

      requestAnimationFrame(() => {
        const w = wrapper.offsetWidth;
        const h = wrapper.offsetHeight;
        const pos = findPosition(w, h);

        if (!pos) {
          wrapper.remove();
          return;
        }

        wrapper.style.left = pos.x + 'px';
        wrapper.style.top = pos.y + 'px';
        wrapper.style.transformOrigin = 'center center';

        const cardEntry = { el: wrapper, rect: pos };
        activeCards.push(cardEntry);

        animateCard(wrapper, CARD_DURATION);

        setTimeout(() => {
          wrapper.remove();
          activeCards = activeCards.filter(c => c !== cardEntry);
          spawnCard();
        }, CARD_DURATION);
      });
    }

    async function init() {
      await fetchRecords();
      setTimeout(() => spawnCard(), 0);
      setTimeout(() => spawnCard(), 800);
      setTimeout(() => spawnCard(), 1600);
      setTimeout(() => spawnCard(), 2400);
      setInterval(() => {
        if (activeCards.length < MAX_CARDS) spawnCard();
      }, SPAWN_INTERVAL);
      setInterval(fetchRecords, 30000);
    }

    init();
  </script>

</body>
</html>

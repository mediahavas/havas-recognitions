<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Havas Wall of Thanks</title>
  <style>
    @font-face {
      font-family: 'BaikalExpSemi';
      src: url('BaikalExp-SemiBold.otf') format('opentype');
    }
    @font-face {
      font-family: 'BaikalNormalReg';
      src: url('BaikalNormal-Regular.otf') format('opentype');
    }
    @font-face {
      font-family: 'BaikalNormalSemi';
      src: url('BaikalNormal-SemiBold.otf') format('opentype');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-image: url('Background.png');
      background-size: cover;
      background-position: top center;
      font-family: 'BaikalNormalReg', Arial, sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    header {
      text-align: center;
      padding: 32px 0 0;
      position: relative;
      z-index: 10;
    }
    .hmn-logo {
      height: 24px;
      margin-bottom: 16px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    header h1 {
      font-family: 'BaikalExpSemi', Arial, sans-serif;
      font-size: 68px;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1;
      margin-bottom: 12px;
    }
    header p {
      font-family: 'BaikalNormalReg', Arial, sans-serif;
      font-size: 24px;
      color: #ffffff;
      font-weight: 300;
    }
    .stage {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .card-wrapper {
      position: absolute;
      border-radius: 22px;
      padding: 3px;
      background: rgba(255, 255, 255, 0.5);
      width: fit-content;
      min-width: 326px;
      max-width: 480px;
      opacity: 0;
      transform: scale(0.9);
      will-change: transform, opacity;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 32px 36px;
      width: fit-content;
      min-width: 320px;
      max-width: 474px;
    }
    .card-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }
    .emoji-circle {
      width: 56px;
      height: 56px;
      background: #b3ecf7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }
    .name-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 5px;
    }
    .eyebrow {
      font-family: 'BaikalNormalSemi', Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 1px;
      color: #e60000;
      text-transform: uppercase;
      line-height: 1;
    }
    .name {
      font-family: 'BaikalExpSemi', Arial, sans-serif;
      font-size: 26px;
      color: #000;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      line-height: 1.1;
    }
    .message {
      font-family: 'BaikalNormalReg', Arial, sans-serif;
      font-size: 17px;
      color: #222;
      line-height: 1.3;
      margin-bottom: 18px;
    }
    .sender {
      font-family: 'BaikalNormalReg', Arial, sans-serif;
      font-size: 14px;
      color: #000;
    }
    .qr-container {
      position: fixed;
      bottom: 32px;
      left: 32px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .qr-box {
      width: 170px;
      height: 170px;
      background: #000000;
      border-radius: 16px;
      border: 4px solid rgba(230, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      box-shadow: none;
    }
    .qr-box img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .qr-label {
      font-family: 'BaikalExpSemi', Arial, sans-serif;
      font-size: 14px;
      color: #ffffff;
      text-align: center;
      letter-spacing: 1px;
      text-transform: uppercase;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <header>
    <img class="hmn-logo" src="hmn.svg" alt="Havas Media Network"/>
    <h1>Wall of Thanks</h1>
    <p>Recognizing the people who make us great</p>
  </header>

  <div class="stage" id="stage"></div>

  <div class="qr-container">
    <div class="qr-box">
      <img src="qrcode.svg" alt="QR Code" style="filter: invert(1);"/>
    </div>
    <div class="qr-label">SCAN TO SEND<br>A SHOUTOUT</div>
  </div>

  <script>
    const TOKEN = 'patNkkOOneKrjQRUH.188b143ed415d7f45eb1f55f73af3caef651e9f328174b4b9fcc60e25430d724';
    const BASE_ID = 'apprduW0ct2f5OLEa';
    const TABLE_NAME = 'Table 1';

    const MARGIN = 80;
    const QR_SAFE_WIDTH = 230;
    const QR_SAFE_HEIGHT = 280;
    let MAX_CARDS = 1;
    const HEADER_H = 240;
    const SPAWN_INTERVAL = 500;

    let activeCards = [];
    let records = [];
    let queue = [];
    let recentlyShown = [];
    let lastZone = -1;

    function getCardDuration(message) {
      const len = message.length;
      if (len <= 80) return 3000;
      if (len <= 160) return 5000;
      return 7000;
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function buildQueue() {
      let shuffled = shuffle([...records]);
      if (recentlyShown.length > 0 && shuffled.length > 1) {
        const lastName = recentlyShown[recentlyShown.length - 1];
        if (shuffled[0].fields['Recipient'] === lastName) {
          shuffled.push(shuffled.shift());
        }
      }
      queue = shuffled;
    }

    async function fetchRecords() {
      try {
        const res = await fetch(
          `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE_NAME)}`,
          { headers: { Authorization: `Bearer ${TOKEN}` } }
        );
        const data = await res.json();
        if (data.records && data.records.length > 0) {
          if (data.records.length !== records.length) {
            records = data.records;
            buildQueue();
          }
          if (records.length <= 3) {
            MAX_CARDS = 1;
          } else if (records.length <= 7) {
            MAX_CARDS = 2;
          } else {
            MAX_CARDS = 3;
          }
        }
      } catch (err) {
        console.error(err);
      }
    }

    function getNextRecord() {
      if (records.length === 0) return null;
      if (queue.length === 0) buildQueue();

      const activeNames = activeCards.map(c => c.name);
      let attempts = 0;
      while (attempts < queue.length) {
        const candidate = queue[0];
        const candidateName = candidate.fields['Recipient'] || '';
        if (!activeNames.includes(candidateName)) {
          queue.shift();
          recentlyShown.push(candidateName);
          if (recentlyShown.length > records.length) recentlyShown.shift();
          return candidate;
        }
        queue.push(queue.shift());
        attempts++;
      }
      const record = queue.shift();
      return record;
    }

    function rectsOverlap(a, b) {
      return !(a.x + a.w + MARGIN < b.x ||
               b.x + b.w + MARGIN < a.x ||
               a.y + a.h + MARGIN < b.y ||
               b.y + b.h + MARGIN < a.y);
    }

    function findPosition(w, h) {
      const stageW = window.innerWidth;
      const stageH = window.innerHeight;

      const qrZone = { x: 0, y: stageH - QR_SAFE_HEIGHT, w: QR_SAFE_WIDTH, h: QR_SAFE_HEIGHT };

      const zones = [
        { xMin: MARGIN, xMax: stageW / 2 - w / 2, yMin: HEADER_H, yMax: stageH / 2 - h / 2 },
        { xMin: stageW / 2, xMax: stageW - w - MARGIN, yMin: HEADER_H, yMax: stageH / 2 - h / 2 },
        { xMin: QR_SAFE_WIDTH + MARGIN, xMax: stageW / 2 - w / 2, yMin: stageH / 2, yMax: stageH - h - MARGIN },
        { xMin: stageW / 2, xMax: stageW - w - MARGIN, yMin: stageH / 2, yMax: stageH - h - MARGIN }
      ];

      let zoneIndex;
      do {
        zoneIndex = Math.floor(Math.random() * zones.length);
      } while (zoneIndex === lastZone && zones.length > 1);
      lastZone = zoneIndex;

      const zone = zones[zoneIndex];
      for (let attempt = 0; attempt < 80; attempt++) {
        const x = Math.floor(Math.random() * Math.max(1, zone.xMax - zone.xMin)) + zone.xMin;
        const y = Math.floor(Math.random() * Math.max(1, zone.yMax - zone.yMin)) + zone.yMin;
        const clampedX = Math.max(MARGIN, Math.min(stageW - w - MARGIN, x));
        const clampedY = Math.max(HEADER_H, Math.min(stageH - h - MARGIN, y));
        const candidate = { x: clampedX, y: clampedY, w, h };
        const overlapsCard = activeCards.some(c => rectsOverlap(candidate, c.rect));
        const overlapsQR = rectsOverlap(candidate, qrZone);
        if (!overlapsCard && !overlapsQR) return candidate;
      }
      return null;
    }

    function animateCard(el, duration) {
      const start = performance.now();
      const startScale = 0.9;
      const endScale = 1.06;
      const fadeInDuration = 600;
      const fadeOutStart = duration - 500;

      function frame(now) {
        const elapsed = now - start;
        if (elapsed > duration) {
          el.style.opacity = 0;
          el.style.transform = `scale(${endScale})`;
          return;
        }
        const progress = elapsed / duration;
        const scale = startScale + (endScale - startScale) * progress;
        let opacity = 1;
        if (elapsed < fadeInDuration) {
          opacity = elapsed / fadeInDuration;
        } else if (elapsed > fadeOutStart) {
          opacity = 1 - (elapsed - fadeOutStart) / 500;
        }
        el.style.transform = `scale(${scale})`;
        el.style.opacity = Math.max(0, Math.min(1, opacity));
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    function spawnCard() {
      if (activeCards.length >= MAX_CARDS || records.length === 0) return;

      const record = getNextRecord();
      if (!record) return;
      const f = record.fields;
      const message = f['Message'] || '';
      const duration = getCardDuration(message);

      const stage = document.getElementById('stage');
      const wrapper = document.createElement('div');
      wrapper.className = 'card-wrapper';
      wrapper.innerHTML = `
        <div class="card">
          <div class="card-top">
            <div class="emoji-circle">${f['Emoji'] || '⭐'}</div>
            <div class="name-block">
              <div class="eyebrow">${f['Department'] || ''}</div>
              <div class="name">${f['Recipient'] || ''}</div>
            </div>
          </div>
          <div class="message">"${message}"</div>
          <div class="sender">— ${f['Name'] || ''}</div>
        </div>
      `;

      wrapper.style.left = '-9999px';
      wrapper.style.top = '-9999px';
      wrapper.style.opacity = '0';
      stage.appendChild(wrapper);

      requestAnimationFrame(() => {
        const w = wrapper.offsetWidth;
        const h = wrapper.offsetHeight;
        const pos = findPosition(w, h);

        if (!pos) {
          wrapper.remove();
          return;
        }

        wrapper.style.left = pos.x + 'px';
        wrapper.style.top = pos.y + 'px';
        wrapper.style.transformOrigin = 'center center';

        const cardEntry = { el: wrapper, rect: pos, name: f['Recipient'] || '' };
        activeCards.push(cardEntry);

        animateCard(wrapper, duration);

        setTimeout(() => spawnCard(), duration - 1500);

        setTimeout(() => {
          wrapper.remove();
          activeCards = activeCards.filter(c => c !== cardEntry);
        }, duration);
      });
    }

    async function init() {
      await fetchRecords();
      buildQueue();
      setTimeout(() => spawnCard(), 0);
      setTimeout(() => spawnCard(), 1000);
      setTimeout(() => spawnCard(), 2000);
      setTimeout(() => spawnCard(), 3000);
      setInterval(() => {
        if (activeCards.length < MAX_CARDS) spawnCard();
      }, SPAWN_INTERVAL);
      setInterval(fetchRecords, 3000);
    }

    init();
  </script>

</body>
</html>
